<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cliffale Analytics</title>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0b1220;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    p {
      color: #9ca3af;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .buttons {
      margin-top: 20px;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
      transition: 0.3s;
    }

    .primary {
      background: #3b82f6;
      color: white;
    }

    .primary:hover {
      background: #2563eb;
    }

    .secondary {
      background: #facc15;
      color: black;
    }

    .secondary:hover {
      background: #eab308;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 60px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    .card h3 {
      margin-bottom: 10px;
    }
  </style>

  <!-- Amplitude -->
  <script src="https://cdn.amplitude.com/libs/analytics-browser-2.11.0-min.js.gz"></script>
  <script>
    window.amplitude.init("3090ccaf80bce790db01321e24bc45b9");
    amplitude.track("Page Viewed");
  </script>

</head>

<body>

  <div class="container">
    <h1>Turn Data Into Growth</h1>
    <p>Understand user behavior, optimize conversions, and scale smarter.</p>

    <div class="buttons">
      <button class="btn primary" id="signupBtn">Get Started</button>
      <button class="btn secondary" id="demoBtn">Book Demo</button>
    </div>

    <div class="features">
      <div class="card">
        <h3>Real-Time Analytics</h3>
        <p>Track user behavior instantly.</p>
      </div>

      <div class="card">
        <h3>Conversion Funnels</h3>
        <p>Understand where users drop off.</p>
      </div>

      <div class="card">
        <h3>User Segmentation</h3>
        <p>Create powerful cohorts.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("signupBtn").addEventListener("click", () => {
      amplitude.track("Sign Up Clicked", {
        intent: "self_service"
      });
    });

    document.getElementById("demoBtn").addEventListener("click", () => {
      amplitude.track("Request Demo Clicked", {
        intent: "sales"
      });
    });
  </script>

</body>
</html>
